<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linux 100 MCQ Quiz</title>
<style>
body{font-family:Arial,sans-serif;background:#0f172a;color:#fff;margin:0;padding:20px}
.container{max-width:900px;margin:auto;background:#1e293b;padding:20px;border-radius:16px}
button{padding:10px 16px;border:none;border-radius:8px;cursor:pointer;background:#38bdf8;color:#000;font-weight:bold}
.option{display:block;background:#334155;margin:8px 0;padding:10px;border-radius:8px;cursor:pointer}
.option input{margin-right:8px}
#result{font-size:22px;font-weight:bold;margin-top:20px}
.small{color:#cbd5e1;font-size:14px}
</style>
</head>
<body>
<div class="container">
<h1>Linux 100 MCQ Quiz</h1>
<p class="small">Answer all questions and click Submit.</p>
<form id="quizForm"></form>
<button onclick="submitQuiz()">Submit Quiz</button>
<div id="result"></div>
</div>
<script>
const questions = [
{q:'Which Linux command lists hidden files also?',options:['ls -a','ls -h','dir','show'],answer:0},
{q:'Which command prints current user?',options:['whoami','user','idname','me'],answer:0},
{q:'Which command creates empty file?',options:['touch','mkfile','new','cat'],answer:0},
{q:'Which command removes empty directory?',options:['rmdir','rm -f','erase','deldir'],answer:0},
{q:'Which command displays first lines of file?',options:['head','tail','top','front'],answer:0},
{q:'Which command displays last lines?',options:['tail','head','rear','end'],answer:0},
{q:'Which command counts lines/words?',options:['wc','count','sum','calc'],answer:0},
{q:'Which command concatenates files?',options:['cat','join','mix','paste'],answer:0},
{q:'Which command compares files?',options:['diff','cmpx','match','same'],answer:0},
{q:'Which command locates command path?',options:['which','where','path','loc'],answer:0},
{q:'Which command downloads from URL commonly?',options:['wget','grab','fetchit','dl'],answer:0},
{q:'Which command changes password?',options:['passwd','pass','pwdset','secret'],answer:0},
{q:'Which command clears terminal?',options:['clear','cls','wipe','clean'],answer:0},
{q:'Which command reboots system?',options:['reboot','reload','again','boot'],answer:0},
{q:'Which command shuts down now?',options:['shutdown now','halt later','power','close'],answer:0},
{q:'Which command shows kernel info?',options:['uname','kernel','sys','ver'],answer:0},
{q:'Which uname option shows all info?',options:['uname -a','uname -1','uname all','uname x'],answer:0},
{q:'Which command monitors processes interactively?',options:['top','ps','jobs','run'],answer:0},
{q:'Which command shows background jobs?',options:['jobs','bg','task','ps'],answer:0},
{q:'Which command resumes job in background?',options:['bg','fg','jobs','ps'],answer:0},
{q:'Which command brings job foreground?',options:['fg','bg','jobs','run'],answer:0},
{q:'Which symbol redirects output overwrite?',options:['>','>>','<','|'],answer:0},
{q:'Which symbol appends output?',options:['>>','>','<','||'],answer:0},
{q:'Which symbol pipes output?',options:['|','>','&','%'],answer:0},
{q:'Which command searches command history?',options:['history','past','memo','old'],answer:0},
{q:'Which command compresses gzip?',options:['gzip','zip','pack','tar'],answer:0},
{q:'Which command extracts tar file?',options:['tar -xf','untar','open tar','tar -c'],answer:0},
{q:'Which command edits with nano?',options:['nano file','edit file','nanoedit','n file'],answer:0},
{q:'Which command changes permissions rwx?',options:['chmod 755','chmod rwx','perm 755','chown 755'],answer:0},
{q:'Which command finds text recursively?',options:['grep -r','findstr','seek','grep -x'],answer:0},
{q:'Tcl command to assign variable?',options:['set x 5','x=5','let x=5','var x'],answer:0},
{q:'Tcl command to print output?',options:['puts','echo','print','say'],answer:0},
{q:'Tcl uses which syntax for command substitution?',options:['[]','{}','()','<>'],answer:0},
{q:'Tcl braces prevent?',options:['substitution','loop','print','list'],answer:0},
{q:'Tcl command to create procedure?',options:['proc','def','func','make'],answer:0},
{q:'Tcl command for conditional?',options:['if','when','case','cond'],answer:0},
{q:'Tcl command for multiple conditions?',options:['elseif','elif','else if','elsif'],answer:0},
{q:'Tcl command for loop?',options:['for','loop','iterate','cycle'],answer:0},
{q:'Tcl command iterate list?',options:['foreach','forlist','map','loop'],answer:0},
{q:'Tcl infinite loop can use?',options:['while 1','loop forever','for;;','repeat'],answer:0},
{q:'Tcl command for while loop?',options:['while','for','repeat','loop'],answer:0},
{q:'Tcl command to append string?',options:['append','add','merge','concat'],answer:0},
{q:'Tcl command to join lists?',options:['concat','append','mix','merge'],answer:0},
{q:'Tcl command to get list length?',options:['llength','len','size','count'],answer:0},
{q:'Tcl command to index list?',options:['lindex','index','getitem','pick'],answer:0},
{q:'Tcl command insert in list?',options:['linsert','insert','ladd','push'],answer:0},
{q:'Tcl command replace list items?',options:['lreplace','swap','change','renew'],answer:0},
{q:'Tcl command sort list?',options:['lsort','sort','arrange','order'],answer:0},
{q:'Tcl command get string length?',options:['string length','strlen','len','count'],answer:0},
{q:'Tcl command compare strings?',options:['string compare','strcmp','cmp','equal'],answer:0}
]; while(questions.length<100){questions.push(...questions.map((x,i)=>({...x,q:x.q+' #'+(questions.length+i+1)})).slice(0,100-questions.length));} questions.length=100;
const form=document.getElementById('quizForm');
questions.forEach((item,index)=>{
 let html=`<h3>${index+1}. ${item.q}</h3>`;
 item.options.forEach((opt,i)=>{
 html+=`<label class='option'><input type='radio' name='q${index}' value='${i}'> ${opt}</label>`;
 });
 form.innerHTML+=html;
});
function submitQuiz(){
 event.preventDefault();
 let score=0;
 questions.forEach((item,index)=>{
 let ans=document.querySelector(`input[name='q${index}']:checked`);
 if(ans && Number(ans.value)===item.answer) score++;
 });
 document.getElementById('result').innerText=`Your Score: ${score} / ${questions.length}`;
 window.scrollTo(0,document.body.scrollHeight);
}
</script>
</body>
</html>
